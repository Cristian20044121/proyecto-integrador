                <form action="#">
                    <fieldset id="caja">
                    <legend>Datos Del Producto</legend>
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre"  required> <br>

                    <label for="precio">Precio:</label>
                    <input type="number" required id="precio" placeholder="$199.000"> <br>

                    <label for="stock">Stock:</label>
                    <input type="number" required id="stock" min="1" max="10" placeholder="Ej: 1-10"> <br>

                    <label for="marca">Marca:</label>
                    <input type="text" required id="marca"> <br>

                    <label for="categoria">Categoria:</label>
                    <select  id="categoria" required>
                        <option value="">Seleccionar</option>
                        <option value="1">Autos y circuitos</option>
                        <option value="2">Mesa</option>
                        <option value="3">Figuras de acción</option>
                        <option value="4">Muñecas</option>
                        <option value="5">Robots</option>
                    </select>
                    <br>
                    

                    <label for="descripcion-corta">Descripcion Corta:</label>
                    <textarea name="descripcion" id="descripcion-corta" cols="30" rows="10" required minlength="20" maxlength="60"></textarea> <br>

                    <label for="descripcion-larga">Descripcion Larga:</label>
                    <textarea  id="descripcion-larga" maxlength="100"  cols="30" rows="10"></textarea> <br>
                    <div class="flex">
                    <label for="envio-sin-cargo">Envio Sin Cargo:</label>

                    <label for="no" name="no"><br> No 
                        <input type="radio" id="no" value="no" name="seleccion">
                    </label>

                    <label for="si"> <br> Si
                        <input type="radio" id="si" value="si" name="seleccion" checked>
                    </label> <br>

                    

                    <label for="edad-desde">Edad Desde:</label>
                    <label for="pequeños">
                        <input type="radio" id="pequeños" name="edad-desde" checked> 
                        3-5 años
                    </label>

                    <label for="medianos"> 
                        <input type="radio" id="medianos" name="edad-desde"> 
                        5-10 años
                    </label>
                    <label for="edad-hasta">Edad Hasta:</label>
                    <label for="grandes"> 
                        <input type="radio" id="grandes" name="edad-hasta"> 
                        10-18 años
                    </label>
                    <label for="grandes"> 
                        <input type="radio" id="grandes" name="edad-hasta"> 
                        18-25 años
                    </label>
                </div> <br> <br>
                <label for="file">Cargar Foto:</label>
                <input type="file" required id="file">
                </div> <br> <br>
                    <input type="submit" id="btn" disabled>
                </form>
